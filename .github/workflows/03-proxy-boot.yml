# Tests that the BungeeCord proxy boots with EaglerXServer loaded.
# Validates the proxy can start independently of the backend.

name: "03 - Proxy Boot"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  proxy-boot:
    name: Boot BungeeCord Proxy
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Make scripts executable
        run: chmod +x scripts/*.sh

      - name: Download proxy dependencies
        run: |
          bash scripts/download_bungeecord.sh
          bash scripts/download_eaglerxserver.sh
          bash scripts/download_viaversion.sh
          bash scripts/download_viabackwards.sh
          bash scripts/download_viabungee.sh

      - name: Start proxy
        run: bash scripts/start_proxy_twopass.sh

      - name: Wait for proxy to boot and plugins to load
        run: |
          timeout 90 bash -c 'while ! grep -q "Listening on" proxy/logs/latest.log 2>/dev/null; do sleep 2; done' || {
            echo "[FAIL] Proxy did not boot within 90 seconds" >&2
            exit 1
          }
          echo "[PASS] Proxy booted successfully"
          # Wait for stdout buffer to flush (Java buffers stdout when redirecting to file)
          sleep 5
          sync

      - name: Check EaglerXServer loaded
        run: |
          LOG="proxy/logs/latest.log"
          grep -q "EaglerXServer" "$LOG" || { echo "[FAIL] EaglerXServer not found in logs" >&2; exit 1; }
          ! grep -q "Could not load 'plugins/EaglerXServer.jar'" "$LOG" || { echo "[FAIL] EaglerXServer load error" >&2; exit 1; }
          ! grep -q "UnsupportedClassVersionError" "$LOG" || { echo "[FAIL] Java version error" >&2; exit 1; }
          echo "[PASS] EaglerXServer loaded successfully"

      - name: Check EaglerXServer injected listeners
        run: |
          LOG="proxy/logs/latest.log"
          grep -q "inject" "$LOG" 2>/dev/null || {
            echo "[WARN] No injection log found — EaglerXServer may not have injected into BungeeCord pipeline"
          }

      - name: Stop proxy
        if: always()
        run: |
          if [ -f proxy/server.pid ]; then
            kill "$(cat proxy/server.pid)" 2>/dev/null || true
            sleep 3
            kill -9 "$(cat proxy/server.pid)" 2>/dev/null || true
          fi

      - name: Upload proxy logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: proxy-boot-logs
          path: |
            proxy/logs/
            proxy/plugins/EaglercraftXServer/

      - name: Summary
        run: 'echo "=== PASS: Proxy booted with EaglerXServer ==="'
