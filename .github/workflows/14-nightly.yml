# Nightly CI — runs full test suite and checks for plugin updates.
# Runs daily at 04:00 UTC.

name: "14 - Nightly"

on:
  schedule:
    - cron: "0 4 * * *"

jobs:
  full-suite:
    name: Run Full Test Suite
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Make scripts executable
        run: chmod +x scripts/*.sh

      - name: Download all dependencies
        run: bash scripts/download_all.sh

      - name: Install test dependencies
        run: pip install -r requirements.txt -q

      - name: Validate configs
        run: |
          python3 -c "
          import yaml, glob, sys
          for f in glob.glob('**/*.yml', recursive=True):
              with open(f) as fh: yaml.safe_load(fh)
          "
          grep -q "online-mode=false" backend/server.properties
          grep -q "bungeecord: true" backend/spigot.yml
          echo "[PASS] Config validation"

      - name: Start full stack
        run: bash scripts/start_all.sh

      - name: Run all tests
        run: |
          PROXY_LOG_PATH="$(pwd)/proxy/logs/latest.log" \
          PROXY_PID_FILE="$(pwd)/proxy/server.pid" \
          BACKEND_PID_FILE="$(pwd)/backend/server.pid" \
          pytest tests/ -v --timeout=180 --junitxml=test-results/nightly.xml || true

      - name: Stop all
        if: always()
        run: bash scripts/stop_all.sh || true

      - name: Upload logs and results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: nightly-full-suite
          path: |
            test-results/
            proxy/logs/
            backend/logs/

  check-updates:
    name: Check for Plugin Updates
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Check EaglerXServer updates
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          LATEST=$(curl -sS "https://api.github.com/repos/lax1dude/eaglerxserver/releases/latest" | python3 -c "import sys,json; print(json.load(sys.stdin)['tag_name'])")
          echo "EaglerXServer latest: $LATEST"

      - name: Check ViaVersion updates
        run: |
          LATEST=$(curl -sS "https://api.github.com/repos/ViaVersion/ViaVersion/releases/latest" | python3 -c "import sys,json; print(json.load(sys.stdin)['tag_name'])")
          echo "ViaVersion latest: $LATEST"

      - name: Check ViaBackwards updates
        run: |
          LATEST=$(curl -sS "https://api.github.com/repos/ViaVersion/ViaBackwards/releases/latest" | python3 -c "import sys,json; print(json.load(sys.stdin)['tag_name'])")
          echo "ViaBackwards latest: $LATEST"

  nightly-report:
    name: Post Nightly Report
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [full-suite]
    if: always()

    steps:
      - name: Report result
        run: |
          if [ "${{ needs.full-suite.result }}" == "success" ]; then
            echo "=== NIGHTLY: PASS ==="
          else
            echo "=== NIGHTLY: FAIL ==="
          fi
