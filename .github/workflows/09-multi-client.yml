# Tests 10 simultaneous WebSocket connections.
# Validates the proxy can handle concurrent Eaglercraft clients.

name: "09 - Multi Client"

on:
  push:
    branches: [main]

jobs:
  multi-client:
    name: Test 10 Simultaneous Clients
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Make scripts executable
        run: chmod +x scripts/*.sh

      - name: Download all dependencies
        run: bash scripts/download_all.sh

      - name: Install test dependencies
        run: pip install -r requirements.txt -q

      - name: Start full stack
        run: bash scripts/start_all.sh

      - name: Run multi-client test
        run: |
          pytest tests/test_07_multi_client.py -v \
            --junitxml=test-results/multi-client.xml

      - name: Stop all
        if: always()
        run: bash scripts/stop_all.sh || true

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: multi-client-test-results
          path: |
            test-results/
            proxy/logs/
            backend/logs/

      - name: Summary
        if: always()
        run: echo "=== Multi-client test complete ==="
