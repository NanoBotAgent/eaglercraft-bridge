# Tests Eaglercraft V4 handshake and MOTD response.
# Validates the Eaglercraft protocol handshake flow works correctly.

name: "07 - Eaglercraft Handshake"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  handshake:
    name: Test Eaglercraft Handshake & MOTD
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Make scripts executable
        run: chmod +x scripts/*.sh

      - name: Download all dependencies
        run: bash scripts/download_all.sh

      - name: Install test dependencies
        run: pip install -r requirements.txt -q

      - name: Start full stack
        run: bash scripts/start_all.sh

      - name: Run handshake + MOTD tests
        run: |
          pytest tests/test_04_eaglercraft_handshake.py tests/test_05_motd.py -v \
            --junitxml=test-results/handshake.xml \
            -o junit_logging=all

      - name: Stop all
        if: always()
        run: bash scripts/stop_all.sh || true

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: handshake-test-results
          path: |
            test-results/
            proxy/logs/
            backend/logs/

      - name: Summary
        if: always()
        run: echo "=== Handshake test complete ==="
