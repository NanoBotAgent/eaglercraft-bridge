# Tests full stack boot - backend + proxy both running and connected.
# Validates the proxy can reach the backend and both survive.

name: "05 - Full Stack Boot"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  full-stack:
    name: Boot Backend + Proxy
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"

      - name: Make scripts executable
        run: chmod +x scripts/*.sh

      - name: Download all dependencies
        run: bash scripts/download_all.sh

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python deps
        run: pip install -r requirements.txt -q

      - name: Start backend
        run: bash scripts/start_backend.sh

      - name: Wait for backend
        run: bash scripts/wait_for_backend.sh

      - name: Start proxy
        run: bash scripts/start_proxy_twopass.sh

      - name: Wait for proxy
        run: bash scripts/wait_for_proxy.sh

      - name: Verify both PIDs alive
        run: |
          kill -0 "$(cat backend/server.pid)" 2>/dev/null || { echo "[FAIL] Backend crashed" >&2; exit 1; }
          kill -0 "$(cat proxy/server.pid)" 2>/dev/null || { echo "[FAIL] Proxy crashed" >&2; exit 1; }
          echo "[PASS] Both servers running"

      - name: Check proxy connected to backend
        run: |
          LOG="proxy/logs/latest.log"
          if [ ! -f "$LOG" ]; then
            echo "[FAIL] Proxy log not found at $LOG" >&2
            exit 1
          fi
          # BungeeCord does not always log the server name unless a player connects.
          # Check that EaglerXServer listener injection succeeded instead.
          if ! grep -q "Listener.*injected" "$LOG" 2>/dev/null; then
            echo "[FAIL] EaglerXServer listener injection not found in proxy log" >&2
            echo "--- Proxy log tail ---"
            tail -20 "$LOG"
            exit 1
          fi
          # Also verify EaglerXServer is listening
          if ! grep -q "Listening on" "$LOG" 2>/dev/null; then
            echo "[FAIL] EaglerXServer not listening" >&2
            exit 1
          fi
          echo "[PASS] Proxy booted with EaglerXServer listener injected"

      - name: Check no plugin load errors
        run: |
          LOG="proxy/logs/latest.log"
          if grep -q "Error loading plugin" "$LOG" 2>/dev/null; then
            echo "[FAIL] Plugin load errors found:" >&2
            grep "Error loading plugin" "$LOG" >&2
            exit 1
          fi
          echo "[PASS] No plugin load errors"

      - name: Stop all
        if: always()
        run: bash scripts/stop_all.sh || true

      - name: Upload all logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: full-stack-logs
          path: |
            proxy/logs/
            backend/logs/

      - name: Summary
        run: 'echo "=== PASS: Full stack booted, proxy connected to backend, no plugin errors ==="'
